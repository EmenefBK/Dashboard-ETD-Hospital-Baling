<?xml version="1.0" encoding="utf-8"?>
<!-- Full-color EMTS logo SVG (vector recreation) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="navyGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b2240" />
      <stop offset="100%" stop-color="#07122a" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" />
    </filter>
  </defs>
  <!-- background circle -->
  <circle cx="512" cy="512" r="480" fill="url(#navyGrad)" />
  <!-- gold rings -->
  <circle cx="512" cy="512" r="440" fill="none" stroke="#caa84b" stroke-width="18" />
  <circle cx="512" cy="512" r="380" fill="none" stroke="#caa84b" stroke-width="8" />

  <!-- side red wedges -->
  <g fill="#c74b3a">
    <path d="M790 520 a1 1 0 0 1 32 56 l-44 18 a1 1 0 0 0 -28 -68z" transform="translate(-220,-20)" opacity="1" />
    <!-- stylized decorative wedges using arcs -->
    <path d="M760 420 L820 420 L800 480 L740 480 Z" transform="translate(-260,12) scale(0.7)"/>
    <path d="M260 420 L200 420 L220 480 L280 480 Z" transform="translate(160,12) scale(0.7)"/>
  </g>

  <!-- inner badge area -->
  <g transform="translate(0, -10)">
    <!-- mountains -->
    <path d="M256 360 C 340 240 420 260 512 320 C 600 260 700 240 768 360 C 700 300 620 320 512 280 C 420 320 340 300 256 360 Z"
          fill="#ffffff" opacity="0.95"/>

    <!-- EMTS text -->
    <text x="512" y="520" text-anchor="middle" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="700"
          font-size="220" fill="#d4ac2b" style="letter-spacing:8px">EMTS</text>

    <!-- ECG line -->
    <path d="M220 610 L420 610 L465 570 L500 640 L545 590 L680 610 L804 610"
          fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- HOSPITAL BALING -->
    <text x="512" y="690" text-anchor="middle" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="600"
          font-size="48" fill="#ffffff" letter-spacing="4">HOSPITAL BALING</text>
  </g>

  <!-- outer arc text top: JABATAN KECEMASAN & TRAUMA -->
  <g font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="600" font-size="36" fill="#d4ac2b">
    <path id="topArc" d="M144 300 A368 368 0 0 1 880 300" fill="none" />
    <text>
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">JABATAN KECEMASAN &amp; TRAUMA</textPath>
    </text>
  </g>

  <!-- bottom slogan -->
  <g font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="500" font-size="28" fill="#d4ac2b">
    <path id="botArc" d="M880 720 A368 368 0 0 1 144 720" fill="none" />
    <text>
      <textPath href="#botArc" startOffset="50%" text-anchor="middle">Every Second Counts</textPath>
    </text>
  </g>

</svg>
