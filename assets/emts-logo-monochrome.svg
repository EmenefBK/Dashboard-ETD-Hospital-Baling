<?xml version="1.0" encoding="utf-8"?>
<!-- Monochrome EMTS logo SVG (single-color) -->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="100%" height="100%" fill="#ffffff" />
  <g transform="translate(0,0)" fill="#111111" stroke="none">
    <circle cx="512" cy="512" r="480" fill="#111111" />
    <circle cx="512" cy="512" r="440" fill="none" stroke="#ffffff" stroke-width="12" />
    <circle cx="512" cy="512" r="380" fill="none" stroke="#ffffff" stroke-width="6" />

    <!-- mountain simplified -->
    <path d="M256 360 C 340 240 420 260 512 320 C 600 260 700 240 768 360 C 700 300 620 320 512 280 C 420 320 340 300 256 360 Z"
          fill="#ffffff"/>

    <!-- EMTS -->
    <text x="512" y="520" text-anchor="middle" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="700"
          font-size="220" fill="#ffffff" style="letter-spacing:8px">EMTS</text>

    <!-- ECG line -->
    <path d="M220 610 L420 610 L465 570 L500 640 L545 590 L680 610 L804 610"
          fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- HOSPITAL BALING -->
    <text x="512" y="690" text-anchor="middle" font-family="Segoe UI, Roboto, Arial, sans-serif" font-weight="600"
          font-size="48" fill="#ffffff" letter-spacing="4">HOSPITAL BALING</text>

    <!-- outer texts -->
    <path id="topArcMono" d="M144 300 A368 368 0 0 1 880 300" fill="none" />
    <text font-size="36">
      <textPath href="#topArcMono" startOffset="50%" text-anchor="middle">JABATAN KECEMASAN &amp; TRAUMA</textPath>
    </text>

    <path id="botArcMono" d="M880 720 A368 368 0 0 1 144 720" fill="none" />
    <text font-size="28">
      <textPath href="#botArcMono" startOffset="50%" text-anchor="middle">Every Second Counts</textPath>
    </text>
  </g>
</svg>
